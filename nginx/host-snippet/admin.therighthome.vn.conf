# Nginx server block for admin.therighthome.vn
#
# This file is deployed when running BEHIND an existing host nginx
# (i.e. host nginx already serves other apps). The app container binds
# 127.0.0.1:3002 (configured via APP_HOST_PORT env in docker-compose).
#
# Install on server:
#   sudo cp nginx/host-snippet/admin.therighthome.vn.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue SSL with host certbot:
#   sudo certbot --nginx -d admin.therighthome.vn

server {
    listen 80;
    listen [::]:80;
    server_name admin.therighthome.vn;

    # Certbot will inject the http-01 challenge location and a 301 redirect
    # to https below when we run `certbot --nginx`.

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        client_max_body_size 25M;
    }

    # PWA service worker — must be served with no-cache + correct scope
    location = /sw.js {
        proxy_pass http://127.0.0.1:3002;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }
}
