name: Setup main branch protection

# Auto-runs once when this file lands on main, then on demand.
# Uses GITHUB_TOKEN (App token) with administration:write to PUT a branch
# protection rule that requires the "build" check on main. Idempotent.
on:
  push:
    branches: [main]
    paths: [.github/workflows/setup-protection.yml]
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Enable branch protection on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/branches/main/protection" \
            -d '{
              "required_status_checks": {"strict": false, "contexts": ["build"]},
              "enforce_admins": false,
              "required_pull_request_reviews": null,
              "restrictions": null,
              "allow_force_pushes": false,
              "allow_deletions": false
            }')
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -ge 300 ]; then
            echo "::error::Failed to set branch protection (HTTP $code)"
            echo "::notice::If 403, enable Settings → Actions → General → Workflow permissions → 'Read and write permissions'"
            exit 1
          fi
          echo ""
          echo "✅ Main is now protected. PRs must pass 'build' check before merge."
