name: Setup main branch protection

# Run on demand only. Removes the previous "build is required" rule so that
# we can push/merge to main without waiting on CI — deploy now fires on push
# directly. CI still runs for visibility but does not gate landing.
on:
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove branch protection on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/branches/main/protection")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          # 204 = removed, 404 = no rule existed; both are fine.
          if [ "$code" -ne 204 ] && [ "$code" -ne 404 ]; then
            echo "::error::Failed to delete branch protection (HTTP $code)"
            exit 1
          fi
          echo "✅ Main branch protection removed. Push to main = deploy."
